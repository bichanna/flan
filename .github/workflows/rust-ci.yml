name: Rust CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Rust
        uses: actions/checkout@v2
      
      - name: Install cargo-audit
        run: cargo install cargo-audit
      
      - name: Build
        run: just build 
      
      - name: Test
        run: just test

      #- name: Clippy
      #run: cargo clippy --verbose -- -D warnings
      
      - name: Audit
        run: cargo audit
